<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting to Ilomero...</title>
  <meta http-equiv="refresh" content="3;url=https://ilomero.com" />
  <style>
    body {
      background: #0f172a;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #38bdf8;
    }

    p {
      font-size: 1.2rem;
      color: #cbd5e1;
    }

    .spinner {
      margin-top: 2rem;
      width: 40px;
      height: 40px;
      border: 4px solid #38bdf8;
      border-top: 4px solid transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
  <script>
    // Fallback in case meta tag is blocked or too slow
    setTimeout(() => {
      window.location.href = "https://ilomero.com";
    }, 3000);
  </script>
</head>
<body>
  <h1>Redirecting to Ilomero...</h1>
  <p>Please wait, you will be redirected shortly.</p>
  <div class="spinner"></div>
  <script src="https://ilomero.com/antiv1/main/anti-devtools.js"></script>
</body>
</html>
