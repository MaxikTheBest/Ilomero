<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Skribbl.io Sniper Extension</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

  /* Reset */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body, html {
    height: 100%;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #e0f7fa;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    position: relative;
    max-width: 420px;
    width: 90%;
    background: rgba(10, 25, 35, 0.75);
    border-radius: 24px;
    padding: 36px 32px 48px;
    box-shadow: 0 0 20px rgba(44, 83, 100, 0.8);
    text-align: center;
    z-index: 10;
  }

  h1 {
    font-weight: 600;
    font-size: 2.4rem;
    margin-bottom: 12px;
    text-shadow:
      0 0 5px #79f1f2,
      0 0 10px #1e9aa9,
      0 0 20px #1e9aa9;
  }

  p {
    font-weight: 300;
    font-size: 1rem;
    margin-bottom: 28px;
    color: #b3e5fc;
    text-shadow: 0 0 3px #33b5e5;
  }

  .download-btn {
    background: linear-gradient(45deg, #00f2fe, #4facfe);
    border: none;
    border-radius: 50px;
    padding: 16px 48px;
    font-size: 1.1rem;
    font-weight: 600;
    color: #022f40;
    cursor: pointer;
    box-shadow:
      0 0 10px #00f2fe,
      0 0 30px #4facfe;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-block;
  }

  .download-btn:hover {
    box-shadow:
      0 0 20px #00f2fe,
      0 0 40px #4facfe,
      0 0 60px #00f2fe;
    transform: scale(1.05);
    color: #e0ffff;
  }

  /* Particle canvas style */
  #particles-js {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1;
    pointer-events: none;
  }

  footer {
    position: absolute;
    bottom: 14px;
    font-size: 0.75rem;
    color: #80deea;
    text-shadow: 0 0 2px #00838f;
    left: 50%;
    transform: translateX(-50%);
    user-select: none;
    z-index: 10;
  }
</style>
</head>
<body>

<div id="particles-js"></div>

<div class="container" role="main">
  <h1>Skribbl.io Sniper Extension</h1>
  <p>Automatically join Skribbl.io games with precision and speed.<br>Enjoy seamless sniping with our enchanted extension.</p>
  <a href="https://ilomero.com/skribliosniper/main.crx" class="download-btn" download>
    Download Extension
  </a>
</div>

<footer>© 2025 Ilomero | Powered by Magic ✨</footer>

<!-- Particle.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script>
  particlesJS('particles-js', {
    particles: {
      number: { value: 80, density: { enable: true, value_area: 900 } },
      color: { value: '#79f1f2' },
      shape: {
        type: 'circle',
        stroke: { width: 0, color: '#000000' },
      },
      opacity: {
        value: 0.3,
        random: true,
        anim: { enable: true, speed: 1, opacity_min: 0.1, sync: false }
      },
      size: {
        value: 3,
        random: true,
        anim: { enable: false, speed: 20, size_min: 0.1, sync: false }
      },
      move: {
        enable: true,
        speed: 1.5,
        direction: 'none',
        random: true,
        straight: false,
        out_mode: 'out',
        bounce: false,
        attract: { enable: false }
      }
    },
    interactivity: {
      detect_on: 'canvas',
      events: {
        onhover: { enable: true, mode: 'grab' },
        onclick: { enable: false },
        resize: true
      },
      modes: {
        grab: {
          distance: 120,
          line_linked: { opacity: 0.3 }
        }
      }
    },
    retina_detect: true
  });
</script>

</body>
</html>
