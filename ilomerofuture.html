<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The New Ilomero</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Container */
    .container {
      position: relative;
      z-index: 1;
      max-width: 750px;
      width: 90%;
      padding: 3rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      backdrop-filter: blur(25px);
      box-shadow: 0 0 60px rgba(0, 255, 255, 0.08);
      text-align: center;
      animation: fadeIn 1.5s ease forwards;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      background: linear-gradient(90deg, #38bdf8, #67e8f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeSlideUp 1.5s ease forwards;
    }

    p {
      font-size: 1.2rem;
      color: #cbd5e1;
      margin-top: 1rem;
      line-height: 1.6;
      opacity: 0.85;
      animation: fadeSlideUp 1.8s ease forwards;
    }

    .hint {
      margin-top: 2rem;
      font-size: 0.95rem;
      color: #64748b;
      animation: fadeSlideUp 2s ease forwards;
    }

    /* Button */
    .btn-home {
      margin-top: 3rem;
      padding: 0.85em 2.2em;
      font-size: 1.1rem;
      font-weight: 600;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      border: none;
      border-radius: 40px;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(56, 189, 248, 0.4);
      transition: all 0.3s ease;
      animation: fadeSlideUp 2.3s ease forwards;
      text-decoration: none;
      display: inline-block;
    }

    .btn-home:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 25px rgba(56, 189, 248, 0.6);
    }

    .btn-home:active {
      transform: translateY(1px);
      box-shadow: 0 6px 12px rgba(56, 189, 248, 0.4);
    }

    /* Background Glows */
    .orb {
      position: absolute;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, #38bdf8 0%, transparent 70%);
      filter: blur(120px);
      z-index: 0;
      animation: orbFloat 10s ease-in-out infinite alternate;
      opacity: 0.15;
    }

    .orb.top-left {
      top: -200px;
      left: -250px;
    }

    .orb.bottom-right {
      bottom: -200px;
      right: -250px;
      background: radial-gradient(circle, #0ea5e9 0%, transparent 70%);
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes orbFloat {
      from { transform: scale(1) translateY(0); }
      to { transform: scale(1.05) translateY(-30px); }
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.2rem; }
      p { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <!-- Glowing Background Orbs -->
  <div class="orb top-left"></div>
  <div class="orb bottom-right"></div>

  <!-- Main Content -->
  <div class="container">
    <h1>The New Ilomero</h1>
    <p>
      In the future, <strong>Ilomero</strong> might return online.<br />
      But it won’t be like the original.<br />
      The design, services, and features will be entirely reimagined.
    </p>
    <div class="hint">A new beginning might emerge… but not yet.</div>
    <a href="https://ilomero.com" class="btn-home">Redirect to Home Page</a>
  </div>
  <script src="https://ilomero.com/antiv1/main/anti-devtools.js"></script>
</body>
</html>
