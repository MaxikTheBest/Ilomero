<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skribbl.io Sniper Extension</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet" />
  <style>
    /* Reset */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      overflow: hidden;
      color: #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
    }

    /* Particle background container */
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 0;
      pointer-events: none;
      filter: drop-shadow(0 0 5px rgba(255 255 255 / 0.1));
    }

    /* Main container */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(31, 28, 44, 0.9);
      border-radius: 28px;
      padding: 48px 48px 64px;
      width: 420px;
      max-width: 90vw;
      box-shadow:
        0 4px 12px rgba(255,255,255,0.1),
        0 10px 40px rgba(146,141,171,0.4);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      animation: fadeInUp 1s ease forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-weight: 600;
      font-size: 2.8rem;
      color: #ffecb3;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
      text-shadow:
        0 0 8px #ffd54f,
        0 0 15px #ffb300,
        0 0 25px #ff6f00;
    }

    p {
      font-weight: 300;
      font-size: 1.1rem;
      line-height: 1.5;
      color: #ddd9cccc;
      margin-bottom: 40px;
      max-width: 320px;
      letter-spacing: 0.03em;
      user-select: text;
    }

    /* Download button with glowing neon effect */
    .download-btn {
      position: relative;
      background: linear-gradient(135deg, #ffd54f 0%, #ff6f00 100%);
      color: #311b00;
      font-weight: 700;
      font-size: 1.2rem;
      padding: 18px 56px;
      border-radius: 60px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      box-shadow:
        0 0 12px #ffd54f,
        0 0 25px #ff6f00;
      transition: 
        box-shadow 0.3s ease,
        transform 0.3s ease;
      overflow: hidden;
      user-select: none;
      letter-spacing: 0.06em;
      z-index: 10;
    }

    .download-btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at center, #ffd54f55, transparent 60%);
      filter: blur(20px);
      opacity: 0.7;
      animation: pulseGlow 2.8s ease infinite;
      pointer-events: none;
      z-index: -1;
      border-radius: 60px;
    }

    @keyframes pulseGlow {
      0%, 100% {
        transform: scale(1);
        opacity: 0.7;
      }
      50% {
        transform: scale(1.15);
        opacity: 0.35;
      }
    }

    .download-btn:hover, .download-btn:focus {
      box-shadow:
        0 0 18px #ffe082,
        0 0 35px #ff8f00;
      transform: scale(1.07);
      outline: none;
    }

    footer {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: #e0d9b6aa;
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      text-shadow: 0 0 3px #a1873daa;
      user-select: none;
      z-index: 10;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card {
        padding: 36px 24px 48px;
        width: 90vw;
      }
      h1 {
        font-size: 2.2rem;
      }
      p {
        max-width: 100%;
        font-size: 1rem;
      }
      .download-btn {
        font-size: 1rem;
        padding: 14px 44px;
      }
    }
  </style>
</head>
<body>

  <div id="particles-js"></div>

  <main class="card" role="main" aria-label="Skribbl.io Sniper Extension">
    <h1>Skribbl.io Sniper</h1>
    <p>
      Join Skribbl.io games and snipe all the space in them!<br />
      Download the extension now and make kids cry!
    </p>
    <a href="https://ilomero.com/skribliosniper/main.crx" class="download-btn" download="SkribblioSniper.crx" aria-label="Download Skribbl.io Sniper Extension">
      Download Extension
    </a>
  </main>

  <footer>Ilomero EZ</footer>

  <!-- Particles.js -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    particlesJS('particles-js', {
      particles: {
        number: {
          value: 50,
          density: {
            enable: true,
            value_area: 900
          }
        },
        color: {
          value: ['#ffd54f', '#ffb300', '#ff6f00']
        },
        shape: {
          type: 'circle',
          stroke: {
            width: 0
          }
        },
        opacity: {
          value: 0.35,
          random: true,
          anim: {
            enable: true,
            speed: 0.6,
            opacity_min: 0.1,
            sync: false
          }
        },
        size: {
          value: 4,
          random: true,
          anim: {
            enable: true,
            speed: 3,
            size_min: 1,
            sync: false
          }
        },
        move: {
          enable: true,
          speed: 1.2,
          direction: 'none',
          random: true,
          straight: false,
          out_mode: 'out',
          bounce: false
        },
        line_linked: {
          enable: true,
          distance: 110,
          color: '#ffb300',
          opacity: 0.15,
          width: 1
        }
      },
      interactivity: {
        detect_on: 'canvas',
        events: {
          onhover: {
            enable: true,
            mode: 'grab'
          },
          onclick: {
            enable: false
          },
          resize: true
        },
        modes: {
          grab: {
            distance: 140,
            line_linked: {
              opacity: 0.3
            }
          }
        }
      },
      retina_detect: true
    });
  </script>

</body>
</html>
