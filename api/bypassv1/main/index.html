<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bypass Detected</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background-color: #1a1a1a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background-color: #2a2a2a;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      text-align: center;
      max-width: 500px;
      animation: fadeIn 0.6s ease-out;
    }

    h1 {
      color: #ff4d4d;
      font-size: 28px;
      margin-bottom: 20px;
    }

    p {
      font-size: 16px;
      color: #ccc;
      margin-bottom: 20px;
    }

    .ip-box {
      background: #1f1f1f;
      padding: 10px 20px;
      border-radius: 10px;
      color: #00ffaa;
      margin: 10px auto 20px auto;
      font-weight: bold;
      display: inline-block;
    }

    button {
      background-color: #ff4d4d;
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background-color: #e53e3e;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.96);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>

<div class="card" id="warningBox">
  <h1>Bypass Detected!</h1>
  <p id="message">Please do not bypass the links.</p>
  <div id="ipBox" class="ip-box" style="display: none;">IP: ...</div>
  <button onclick="location.href='https://ilomero.com/'">Return to Home Page</button>
</div>

<script>
  const referrer = document.referrer;

  async function showIP() {
    try {
      const res = await fetch("https://api.ipify.org?format=json");
      const data = await res.json();
      document.getElementById("ipBox").textContent = "Your IP: " + data.ip;
      document.getElementById("ipBox").style.display = "inline-block";
    } catch (e) {
      document.getElementById("ipBox").textContent = "Could not retrieve IP.";
      document.getElementById("ipBox").style.display = "inline-block";
    }
  }

  if (referrer.includes("bypass.city")) {
    document.getElementById("message").textContent = "Please do not use bypass.city or we will have to ban you.";
    showIP();
  }
</script>

</body>
</html>
