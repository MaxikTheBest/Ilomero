<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Key</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background-color: #121212;
      color: #ffffff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .key-box {
      background: #1f1f1f;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    #key {
      font-size: 18px;
      margin-bottom: 10px;
      word-break: break-word;
    }
    .button {
      background: #27ae60;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    .button:hover {
      background: #2ecc71;
    }
  </style>
</head>
<body>

<div class="key-box">
  <h2>Your Key:</h2>
  <div id="key">Validating...</div>
  <button class="button" onclick="copyKey()">Copy Key</button>
</div>

<script>
  const apiEndpoint = "https://publisher.linkvertise.com/api/v1/anti_bypassing";

  function getTokenFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get("token");
  }

  function generateKey(length = 25) {
    const chars = " 7e75346dd52cd1418b068b00b6996128e4d30dd0298c98173a7e9af98c443c03";
    let result = "";
    for (let i = 0; i < length; i++) {
      result += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return result;
  }

  async function validateToken(token) {
    try {
      const response = await fetch(apiEndpoint, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ token })
      });

      const result = await response.json();

      if (result.success) {
        return true;
      } else {
        console.error("Invalid token response:", result);
        return false;
      }
    } catch (error) {
      console.error("Token validation error:", error);
      return false;
    }
  }

  async function init() {
    const token = getTokenFromUrl();

    if (!token) {
      document.getElementById("key").textContent = "Missing token in URL.";
      return;
    }

    const isValid = await validateToken(token);

    if (isValid) {
      const key = generateKey();
      document.getElementById("key").textContent = key;
    } else {
      document.getElementById("key").textContent = "Invalid or expired token.";
    }
  }

  function copyKey() {
    const key = document.getElementById("key").textContent;
    if (key && key !== "Invalid or expired token." && key !== "Missing token in URL.") {
      navigator.clipboard.writeText(key).then(() => {
        alert("Key copied to clipboard!");
      });
    }
  }

  init();
</script>

</body>
</html>
